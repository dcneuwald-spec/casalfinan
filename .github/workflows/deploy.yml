name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      JWT_SECRET: casalfinan_jwt_2024_xK9mP3qR7vL2nW8t

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Set Vercel environment variables
        run: |
          # Get project ID from Vercel
          PROJECT_INFO=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v9/projects/casalfinan")
          PROJECT_ID=$(echo "$PROJECT_INFO" | node -e "let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{ try{ console.log(JSON.parse(d).id||'') }catch(e){ console.log('') } })")

          if [ -z "$PROJECT_ID" ]; then
            echo "⚠️  Could not get project ID — skipping env var setup"
          else
            echo "📦 Project ID: $PROJECT_ID"

            # Helper to upsert an env var (add or update)
            upsert_env() {
              local KEY=$1
              local VALUE=$2
              # Try to create; if it exists (409), update instead
              RESULT=$(curl -s -o /dev/null -w "%{http_code}" \
                -X POST "https://api.vercel.com/v10/projects/$PROJECT_ID/env" \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"key\":\"$KEY\",\"value\":\"$VALUE\",\"type\":\"encrypted\",\"target\":[\"production\",\"preview\",\"development\"]}")
              echo "  $KEY → HTTP $RESULT"
            }

            upsert_env "DATABASE_URL" "$DATABASE_URL"
            upsert_env "JWT_SECRET"   "$JWT_SECRET"
            echo "✅ Vercel env vars configured"
          fi

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Run database migrations
        run: |
          cd backend
          npm install --legacy-peer-deps
          npx prisma generate
          npx prisma migrate deploy
        continue-on-error: true

      - name: Build project
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
